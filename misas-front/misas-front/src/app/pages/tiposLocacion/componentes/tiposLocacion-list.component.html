<div class="container mt-4">
  <div class="card shadow">
    <div class="card-body">

      <h4 class="card-title mb-3">Tipos de locación</h4>

      <table class="table table-hover align-middle">
        <thead class="table-light">
          <tr>
            <th>Nombre</th>
            <th>Descripción</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let tipoLocacion of tiposLocacion">
            <td class="fw-semibold">{{ tipoLocacion.Nombre }}</td>
            <td>{{ tipoLocacion.Descripcion }}</td>
          </tr>
        </tbody>

      </table>

    </div>
  </div>
</div>
