version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: misas_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: misas_db
      MYSQL_USER: misas_user
      MYSQL_PASSWORD: misas_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: